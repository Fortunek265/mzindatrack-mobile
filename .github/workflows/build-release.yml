name: Build and Release MzindaTrack APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort
      
      - name: Run Flake8
        run: flake8 main.py --max-line-length=120 --extend-ignore=E501
        continue-on-error: true
      
      - name: Check code formatting with black
        run: black --check main.py
        continue-on-error: true
      
      - name: Check import sorting with isort
        run: isort --check-only main.py
        continue-on-error: true

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libncurses5 \
            libffi-dev \
            libssl-dev \
            zlib1g-dev
          
          python -m pip install --upgrade pip
          pip install buildozer cython>=0.29.30 pexpect
      
      - name: Configure Android SDK
        env:
          ANDROID_API: 30
          ANDROID_NDK_VERSION: 23c
        run: |
          # Set up environment variables
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
      
      - name: Cache buildozer files
        uses: actions/cache@v3
        with:
          path: |
            .buildozer
            ~/.android
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Build debug APK
        if: github.event.inputs.build_type != 'release' && github.event_name != 'push'
        run: |
          buildozer android debug
      
      - name: Build release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          buildozer android release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: mzindatrack-apk
          path: bin/*.apk
          retention-days: 30
      
      - name: Create build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status**: Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type**: ${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "bin/mzindatrack-*.apk" ]; then
            ls -lh bin/*.apk >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov kivy requests
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download APK artifacts
        uses: actions/download-artifact@v3
        with:
          name: mzindatrack-apk
      
      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## Release $VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Features & Changes:**" >> RELEASE_NOTES.md
          echo "- GPS tracking with 2-meter precision" >> RELEASE_NOTES.md
          echo "- Mobile web view support" >> RELEASE_NOTES.md
          echo "- Token-based authentication" >> RELEASE_NOTES.md
          echo "- Auto-connect functionality" >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: mzindatrack-*.apk
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify release
        run: |
          echo "### 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.changelog.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "APK uploaded to GitHub Releases" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [build, test]
    
    steps:
      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Build successful" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Build failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Print notification
        run: |
          echo "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Tests: ${{ needs.test.result }}"
