name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fix buildozer.spec
      run: |
        sed -i 's/requirements = .*/requirements = python3==3.10.0,kivy==2.3.0,requests,plyer/g' buildozer.spec
        sed -i '/^android.ndk_path/d' buildozer.spec
    
    - name: Build APK
      env:
        BUILDOZER_IGNORE_ROOT: "1"
      run: |
        echo "🚀 Building APK..."
        buildozer -v android debug 2>&1 | tee build.log
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/logs/*.log
        retention-days: 7
