name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 9477386
    
    - name: Install buildozer
      run: |
        pip install buildozer cython
        echo "✅ Buildozer installed"
    
    - name: Create .buildozer-ignore-root
      run: |
        echo "ignore_root = 1" > .buildozer-ignore-root
    
    - name: Build APK
      run: |
        # Fix buildozer.spec for local build
        sed -i '/android.gradle_dependencies/d' buildozer.spec
        echo 'android.gradle_dependencies = androidx.webkit:webkit:1.8.0' >> buildozer.spec
        echo 'android.use_androidx = True' >> buildozer.spec
        
        # Set correct paths
        echo "android.sdk_path = $ANDROID_HOME" >> buildozer.spec
        echo "android.ndk_path = $ANDROID_NDK_HOME" >> buildozer.spec
        
        # Build
        yes y | buildozer -v android debug
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/.buildozer/logs/*.log
          .buildozer.log
        retention-days: 7
