name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK
      run: |
        # Create config to disable root warning
        echo "ignore_root = 1" > .buildozer-ignore-root
        
        # Build with yes command to auto-confirm prompts
        docker run --rm \
          -v $(pwd):/home/user/hostapp \
          -v ~/.buildozer:/home/user/.buildozer \
          -e BUILDOZER_IGNORE_ROOT=1 \
          kivy/buildozer:latest \
          bash -c "
            cd /home/user/hostapp
            
            # Fix WebView dependency
            echo 'android.gradle_dependencies = androidx.webkit:webkit:1.8.0' >> buildozer.spec
            
            # Build with yes pipe
            yes y | buildozer -v android debug
          "
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: ~/.buildozer/logs/*.log
        retention-days: 7
