name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List repository files (debug)
      run: |
        echo "📁 Repository root files:"
        ls -la
        echo ""
        echo "📁 Assets folder (if exists):"
        ls -la assets/ || echo "assets/ folder not found"
        echo ""
        echo "📁 Data folder (if exists):"
        ls -la data/ || echo "data/ folder not found"
    
    - name: Create placeholder icon and presplash
      run: |
        mkdir -p assets data
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
        echo "iVBORw0KGgoAAAANSUhEUgAAAQAAAAEACAYAAABccqhmAAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAOxAAADsQBlSsOGwAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAAA9SURBVHic7cEBDQAAAMKg909tDwcAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA8Gx8QwABqSkbYAAAAABJRU5ErkJggg==" | base64 -d > data/presplash.png
        echo "✅ Created placeholder images"
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          python3-pip python3-dev \
          android-sdk \
          android-sdk-platform-tools
        echo "ANDROIDSDK=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
    
    - name: Install buildozer 1.4.0
      run: |
        pip install --upgrade pip
        pip install buildozer==1.4.0 cython
        buildozer --version
    
    - name: Configure buildozer.spec
      run: |
        echo "🔧 Updating buildozer.spec..."
        sed -i '/android.ndk_path =/c\# android.ndk_path =' buildozer.spec
        sed -i 's/android.ndk = 25c/android.ndk = 23c/g' buildozer.spec
        sed -i 's/android.ndk = 28c/android.ndk = 23c/g' buildozer.spec
        sed -i 's/p4a.branch = master/p4a.branch = develop/g' buildozer.spec
        sed -i 's/p4a.branch = release-2023.7.0/p4a.branch = develop/g' buildozer.spec
        sed -i 's/requirements = python3==3.10.*/requirements = python3==3.9,kivy==2.1.0,requests,plyer,pyjnius,android/g' buildozer.spec
        sed -i 's/requirements = hostpython3.*/requirements = python3==3.9,kivy==2.1.0,requests,plyer,pyjnius,android/g' buildozer.spec
        sed -i 's/kivy-garden.xwebview//g' buildozer.spec
        sed -i 's/,,/,/g' buildozer.spec
        sed -i 's/android.arch =/android.archs =/g' buildozer.spec
        sed -i '/android.sdk =/d' buildozer.spec
        sed -i '/android.features =/d' buildozer.spec
        sed -i 's/android.api = 33/android.api = 30/g' buildozer.spec
        sed -i 's/android.minapi = 21/android.minapi = 21/g' buildozer.spec
        echo ""
        echo "✅ Updated buildozer.spec:"
        echo "   - NDK: 23c"
        echo "   - p4a.branch: develop"
        echo "   - Python: 3.9"
        echo "   - Kivy: 2.1.0"
        echo "   - Removed kivy-garden.xwebview, android.features, android.sdk"
        echo ""
        cat buildozer.spec
    
    - name: Build APK
      id: build
      continue-on-error: true
      run: |
        echo "🚀 Starting build process with buildozer 1.4.0 and p4a develop..."
        buildozer -v android debug 2>&1 | tee build.log
        if ls bin/*.apk 2>/dev/null; then
          echo "✅ APK found!"
          echo "apk_exists=true" >> $GITHUB_OUTPUT
          ls -la bin/*.apk
        else
          echo "❌ No APK found"
          echo "apk_exists=false" >> $GITHUB_OUTPUT
          tail -n 300 build.log
        fi
    
    - name: Upload APK
      if: steps.build.outputs.apk_exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/logs/*.log
          ~/.buildozer/logs/*.log
        retention-days: 7
    
    - name: Build summary
      if: always()
      run: |
        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "## Build Status: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
        echo "### APK Status: ${{ steps.build.outputs.apk_exists == 'true' && '✅ Available' || '❌ Not found' }}" >> $GITHUB_STEP_SUMMARY
