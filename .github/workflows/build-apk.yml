name: Build MzindaTrack APK (Docker Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build with Docker
      run: |
        docker run --rm \
          -e BUILDOZER_IGNORE_ROOT=1 \
          -v $(pwd):/home/user/hostapp \
          -v ~/.buildozer:/home/user/.buildozer \
          kivy/buildozer:latest \
          bash -c "
            # Set the environment variable inside the container
            export BUILDOZER_IGNORE_ROOT=1
            cd /home/user/hostapp
            
            # Make sure buildozer.spec exists
            if [ ! -f buildozer.spec ]; then
              echo 'Creating buildozer.spec...'
              cat > buildozer.spec << 'EOF'
              [app]
              title = MzindaTrack
              package.name = mzindatrack
              package.domain = org.mzindatrack
              source.dir = .
              source.include_exts = py,png,jpg,kv,atlas,ico,json
              version = 1.0.0
              requirements = python3==3.9.5,kivy==2.1.0,requests,plyer
              orientation = portrait
              fullscreen = 0
              
              android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
              android.api = 33
              android.minapi = 21
              android.sdk = 33
              android.ndk = 25c
              android.ndk_api = 21
              android.accept_sdk_license = True
              android.apptheme = @style/Theme.AppCompat
              android.arch = arm64-v8a
              android.use_androidx = True
              android.keep_sdk_tools = True
              android.aab = False
              p4a.branch = master
              
              [buildozer]
              log_level = 2
              warn_on_root = 1
              build_dir = ./.buildozer
              bin_dir = ./bin
              EOF
            fi
            
            # Build - use yes to pipe 'y' for any prompts
            echo '=== Starting build ==='
            yes y | buildozer -v android debug 2>&1 | tee /home/user/hostapp/build.log
            
            echo '=== Build complete ==='
            ls -la bin/ || echo 'No APK found'
          "
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          ~/.buildozer/logs/*.log
        retention-days: 7
