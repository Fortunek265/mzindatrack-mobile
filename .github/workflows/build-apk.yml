name: Build MzindaTrack APK (Ubuntu 22.04)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Use Ubuntu 22.04 instead of latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Build APK
      run: |
        # Create clean buildozer.spec
        cat > buildozer.spec << 'EOF'
        [app]
        title = MzindaTrack
        package.name = mzindatrack
        package.domain = org.mzindatrack
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ico,json
        version = 1.0.0
        requirements = python3==3.9.5,kivy==2.1.0,requests,plyer
        orientation = portrait
        fullscreen = 0
        
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
        android.api = 33
        android.minapi = 21
        android.sdk = 33
        android.ndk = 23c
        android.ndk_api = 21
        android.accept_sdk_license = True
        android.apptheme = @style/Theme.AppCompat
        android.arch = arm64-v8a
        android.use_androidx = True
        android.keep_sdk_tools = True
        android.aab = False
        p4a.branch = master
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        build_dir = ./.buildozer
        bin_dir = ./bin
        EOF
        
        echo "y" | buildozer -v android debug
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/.buildozer/logs/*.log
          .buildozer.log
        retention-days: 7
