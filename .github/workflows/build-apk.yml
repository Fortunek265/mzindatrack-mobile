name: Build MzindaTrack APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build debug APK'
        required: true
        default: true
        type: boolean
      upload_artifacts:
        description: 'Upload APK artifacts'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          libsqlite3-dev \
          libbz2-dev \
          libreadline-dev \
          libgdbm-dev \
          libdb-dev \
          libexpat1-dev \
          libmpdec-dev \
          tk-dev \
          uuid-dev \
          imagemagick

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Create assets directory and icon
      run: |
        mkdir -p assets
        
        # Create a GPS icon if not exists
        if [ ! -f assets/gps.icon ]; then
          echo "Creating GPS icon..."
          convert -size 512x512 xc:transparent \
            -fill '#667eea' -draw 'circle 256,256 256,50' \
            -fill 'white' -draw 'circle 256,256 256,180' \
            -fill '#667eea' -draw 'line 256,100 256,220' \
            -fill '#667eea' -draw 'line 256,292 256,412' \
            -fill '#667eea' -draw 'line 100,256 220,256' \
            -fill '#667eea' -draw 'line 292,256 412,256' \
            assets/gps.png
          cp assets/gps.png assets/gps.icon
        fi

    - name: Cache buildozer
      uses: actions/cache@v3
      with:
        path: |
          .buildozer
          ~/.cache/pip
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: buildozer -v android debug

    - name: List built files
      run: |
        echo "=== Built files ==="
        ls -la bin/
        echo "=== APK files ==="
        find . -name "*.apk" -type f

    - name: Upload APK
      if: inputs.upload_artifacts != false
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload APK to release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: MzindaTrack v1.0.${{ github.run_number }}
        body: |
          ## MzindaTrack Mobile APK
          
          ### Features:
          - GPS Tracking with 2-meter precision
          - Real-time location updates
          - User-friendly mobile interface
          - Token-based authentication
          - Auto-connect functionality
          
          ### Installation:
          1. Download the APK
          2. Enable "Install from Unknown Sources" in Android settings
          3. Install the APK
          4. Open the app and enter your credentials
          
          ### System Requirements:
          - Android 5.0 (API 21) or higher
          - Internet connection
          - GPS enabled for tracking
        files: bin/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
