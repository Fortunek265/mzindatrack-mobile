name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fix buildozer.spec
      run: |
        sed -i 's/requirements = .*/requirements = python3==3.10.0,kivy==2.3.0,requests,plyer/g' buildozer.spec
        sed -i '/^android.ndk_path/d' buildozer.spec
    
    - name: Build APK
      env:
        # Skip root check
        BUILDOZER_IGNORE_ROOT: 1
      run: buildozer -v android debug
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
