name: Build MzindaTrack APK (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK
      run: |
        docker run --rm \
          -v $(pwd):/home/user/hostapp \
          -v ~/.buildozer:/home/user/.buildozer \
          kivy/buildozer:latest \
          bash -c "
            cd /home/user/hostapp
            # Fix requirements
            sed -i 's/requirements = .*/requirements = python3==3.9.5,kivy==2.1.0,requests,plyer,kivy-garden.xwebview/g' buildozer.spec
            # Build
            buildozer android debug
            # Show results
            ls -la bin/ || echo 'No APK found'
          "
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
