name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev liblzma-dev libbz2-dev libsqlite3-dev \
          libopenblas-dev libxml2-dev libxslt1-dev libjpeg-dev libpng-dev \
          libfreetype6-dev python3-pip python3-dev python3-venv wget \
          libgl1-mesa-dev libgles2-mesa-dev
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Install Python packages
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython virtualenv Pillow
    
    - name: Setup Android SDK
      run: |
        # Create SDK directory
        mkdir -p ~/.buildozer/android/platform/android-sdk
        
        # Download command line tools
        cd ~/.buildozer/android/platform
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        # Set environment variables
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        
        # Accept licenses
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        
        # Install required SDK components
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools" "tools" > /dev/null 2>&1
        
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        
        # Verify installation
        echo "✅ Android SDK installed successfully"
        sdkmanager --list | grep -E "(platforms|build-tools)" | head -5 || true
    
    - name: Create placeholder images
      run: |
        mkdir -p assets data
        python3 -c "
        from PIL import Image, ImageDraw, ImageFont
        import os
        
        # Create icon
        img = Image.new('RGB', (512, 512), color='#667eea')
        d = ImageDraw.Draw(img)
        try:
            font = ImageFont.truetype('/usr/share/fonts/truetype/ubuntu/Ubuntu-B.ttf', 200)
        except:
            font = ImageFont.load_default()
        d.text((256, 256), 'MT', fill='white', anchor='mm', font=font)
        img.save('assets/icon.png')
        
        # Create presplash
        img2 = Image.new('RGB', (1080, 1920), color='#0a0f1e')
        d2 = ImageDraw.Draw(img2)
        try:
            font2 = ImageFont.truetype('/usr/share/fonts/truetype/ubuntu/Ubuntu-B.ttf', 80)
            font3 = ImageFont.truetype('/usr/share/fonts/truetype/ubuntu/Ubuntu-R.ttf', 40)
        except:
            font2 = ImageFont.load_default()
            font3 = ImageFont.load_default()
        d2.text((540, 800), 'MzindaTrack', fill='#667eea', anchor='mm', font=font2)
        d2.text((540, 950), 'GPS yathu, Chitetezo chathu', fill='#8892b0', anchor='mm', font=font3)
        img2.save('data/presplash.png')
        print('✅ Images created successfully')
        "
    
    - name: Update buildozer spec
      run: |
        # Ensure buildozer.spec has correct SDK settings
        sed -i 's/android.skip_update = True/android.skip_update = False/g' buildozer.spec || true
        sed -i 's/android.ndk = 25c/android.ndk = 23c/g' buildozer.spec || true
        sed -i 's/android.arch = arm64-v8a/android.arch = arm64-v8a/g' buildozer.spec || true
        
        # Add webview requirement if missing
        if ! grep -q "kivy-garden.xwebview" buildozer.spec; then
          sed -i '/requirements =/ s/$/,kivy-garden.xwebview/' buildozer.spec
        fi
        
        echo "✅ Buildozer spec updated"
    
    - name: Build APK
      env:
        ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
      run: |
        # Clean previous builds
        rm -rf .buildozer/bin || true
        rm -rf .buildozer/android/platform/build || true
        
        # Build with verbose output
        buildozer -v android debug
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/logs/*.log
          .buildozer/android/platform/build/build.log
        retention-days: 7
    
    - name: Upload SDK logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: sdk-logs
        path: ~/.buildozer/android/platform/android-sdk
        retention-days: 3
