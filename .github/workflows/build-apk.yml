name: Build MzindaTrack APK (Non-Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
        pip install buildozer cython
    
    - name: Build APK
      run: |
        # Use existing buildozer.spec but update NDK
        if [ -f buildozer.spec ]; then
          sed -i 's/android.ndk = 23c/android.ndk = 25c/g' buildozer.spec
          echo "✅ Updated NDK to 25c"
        else
          echo "❌ No buildozer.spec found"
          exit 1
        fi
        
        echo "📄 Buildozer.spec:"
        cat buildozer.spec
        
        echo "🚀 Starting build..."
        echo "y" | buildozer -v android debug 2>&1 | tee build.log
        
        echo "📁 Checking for APK..."
        ls -la bin/ || echo "No APK found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          ~/.buildozer/logs/*.log
        retention-days: 7
