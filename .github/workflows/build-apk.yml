name: Build MzindaTrack APK (Ubuntu 22.04)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = MzindaTrack
        package.name = mzindatrack
        package.domain = org.mzindatrack
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ico,json
        version = 1.0.0
        requirements = python3==3.9.5,kivy==2.1.0,requests,plyer
        orientation = portrait
        fullscreen = 0
        
        android.permissions = INTERNET,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
        android.api = 33
        android.minapi = 21
        android.sdk = 33
        android.ndk = 23c
        android.ndk_api = 21
        android.accept_sdk_license = True
        android.apptheme = @style/Theme.AppCompat
        android.arch = arm64-v8a
        android.use_androidx = True
        android.keep_sdk_tools = True
        android.aab = False
        p4a.branch = master
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        build_dir = ./.buildozer
        bin_dir = ./bin
        EOF
        
        echo "✅ buildozer.spec created"
        cat buildozer.spec
    
    - name: Build APK with full logging
      run: |
        echo "🚀 Starting build..."
        echo "y" | buildozer -v android debug 2>&1 | tee build_full.log
        
        # Check exit code
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "✅ Build completed successfully"
        else
          echo "❌ Build failed with exit code ${PIPESTATUS[0]}"
          echo "📄 Showing last 200 lines of build log:"
          tail -n 200 build_full.log
        fi
    
    - name: Check build artifacts
      run: |
        echo "📁 Checking for APK files..."
        ls -la bin/ 2>/dev/null || echo "bin directory not found"
        
        # Look for the actual APK location
        echo "🔍 Searching for .apk files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        
        # Check .buildozer directory
        echo "📂 .buildozer contents:"
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer not found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: |
          bin/*.apk
          **/*.apk
        retention-days: 30
    
    - name: Upload full build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_full.log
          ~/.buildozer/logs/*.log
          .buildozer.log
        retention-days: 7
    
    - name: Upload .buildozer directory
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-files
        path: |
          .buildozer/
          bin/
        retention-days: 7
