name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04  # Using older Ubuntu for better compatibility
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          libbz2-dev \
          libsqlite3-dev \
          libopenblas-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libfreetype6-dev \
          libgdbm-dev \
          libnss3-dev \
          libatk-bridge2.0-dev \
          libgtk-3-dev \
          python3-pip \
          python3-dev \
          python3-venv \
          wget
    
    - name: Install buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython
    
    - name: Create assets directory
      run: |
        mkdir -p assets
        # Create a placeholder icon if missing
        if [ ! -f assets/GPS.ico ]; then
          echo "Creating placeholder icon..."
          # Create simple icon using ImageMagick if available
          # or touch a file to avoid missing file error
          touch assets/GPS.ico
        fi
    
    - name: Build APK
      run: |
        buildozer android debug
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
