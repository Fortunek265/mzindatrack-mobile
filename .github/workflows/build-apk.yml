name: Build MzindaTrack APK (Docker Final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build with Docker
      env:
        BUILDOZER_IGNORE_ROOT: "1"
      run: |
        docker run --rm \
          -e BUILDOZER_IGNORE_ROOT=1 \
          -v $(pwd):/home/user/hostapp \
          -v ~/.buildozer:/home/user/.buildozer \
          kivy/buildozer:latest \
          bash -c "
            cd /home/user/hostapp
            
            # Use original buildozer.spec but change NDK
            sed -i 's/android.ndk = 23c/android.ndk = 25c/g' buildozer.spec || true
            
            echo '=== Buildozer.spec ==='
            cat buildozer.spec
            
            echo '=== Starting build ==='
            buildozer -v android debug 2>&1 | tee /home/user/hostapp/build.log
            
            echo '=== Checking for APK ==='
            find . -name '*.apk' -type f || echo 'No APK found'
          "
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          ~/.buildozer/logs/*.log
        retention-days: 7
