name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List repository files (debug)
      run: |
        echo "📁 Repository root files:"
        ls -la
        echo ""
        echo "📁 Assets folder (if exists):"
        ls -la assets/ || echo "assets/ folder not found"
        echo ""
        echo "📁 Data folder (if exists):"
        ls -la data/ || echo "data/ folder not found"
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          python3-pip python3-dev \
          android-sdk \
          android-sdk-platform-tools
        
        # Set up Android SDK environment
        echo "ANDROIDSDK=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        buildozer --version
    
    - name: Configure buildozer.spec
      run: |
        echo "🔧 Updating buildozer.spec..."
        
        # Remove hardcoded NDK path
        sed -i '/android.ndk_path =/c\# android.ndk_path =' buildozer.spec
        
        # UPDATE: Use NDK 25c (compatible with p4a 2023.9.0)
        sed -i 's/android.ndk = 23c/android.ndk = 25c/g' buildozer.spec
        sed -i 's/android.ndk = 28c/android.ndk = 25c/g' buildozer.spec
        
        # UPDATE: Use stable p4a version 2023.9.0
        sed -i 's/p4a.branch = develop/p4a.branch = 2023.9.0/g' buildozer.spec
        sed -i 's/p4a.branch = master/p4a.branch = 2023.9.0/g' buildozer.spec
        sed -i 's/p4a.branch = 2024.5.1/p4a.branch = 2023.9.0/g' buildozer.spec
        sed -i 's/p4a.branch = 2023.10.0/p4a.branch = 2023.9.0/g' buildozer.spec
        
        # UPDATE: Change android.arch to android.archs (plural)
        sed -i 's/android.arch =/android.archs =/g' buildozer.spec
        
        # UPDATE: Remove deprecated android.sdk line
        sed -i '/android.sdk =/d' buildozer.spec
        
        # UPDATE: Add kivy-garden.xwebview for WebView support
        sed -i 's/requirements = python3==3.9,kivy==2.1.0,requests,plyer,pyjnius,android/requirements = python3==3.9,kivy==2.1.0,requests,plyer,pyjnius,android,kivy-garden.xwebview/g' buildozer.spec
        
        # Ensure Android API is set correctly
        sed -i 's/android.api = 33/android.api = 30/g' buildozer.spec
        sed -i 's/android.minapi = 21/android.minapi = 21/g' buildozer.spec
        
        echo ""
        echo "✅ Updated buildozer.spec with fixes:"
        echo "   - NDK: 25c (compatible with p4a 2023.9.0)"
        echo "   - p4a.branch: 2023.9.0 (stable release)"
        echo "   - android.archs: arm64-v8a"
        echo "   - Removed: android.sdk"
        echo "   - Added: kivy-garden.xwebview"
        echo ""
        echo "📄 Final buildozer.spec:"
        cat buildozer.spec
    
    - name: Build APK
      id: build
      continue-on-error: true
      run: |
        echo "🚀 Starting build process..."
        echo "Using Android SDK: $ANDROID_HOME"
        echo "Using NDK: 25c"
        echo "Using p4a: 2023.9.0"
        
        # Build with verbose logging
        buildozer -v android debug 2>&1 | tee build.log
        
        echo ""
        echo "📁 Checking for APK..."
        if ls bin/*.apk 2>/dev/null; then
          echo "✅ APK found!"
          echo "apk_exists=true" >> $GITHUB_OUTPUT
          echo "📦 APK files:"
          ls -la bin/*.apk
          
          # Also check for AAB if generated
          if ls bin/*.aab 2>/dev/null; then
            echo "📦 AAB files found:"
            ls -la bin/*.aab
            echo "aab_exists=true" >> $GITHUB_OUTPUT
          else
            echo "aab_exists=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "❌ No APK found"
          echo "apk_exists=false" >> $GITHUB_OUTPUT
          echo ""
          echo "📄 Last 300 lines of build log:"
          tail -n 300 build.log
        fi
    
    - name: Upload APK/AAB artifacts
      if: steps.build.outputs.apk_exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-build
        path: |
          bin/*.apk
          bin/*.aab
          bin/*.apks
        retention-days: 30
        compression-level: 0
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/logs/*.log
          ~/.buildozer/logs/*.log
        retention-days: 7
    
    - name: Build summary
      if: always()
      run: |
        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Build Status: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- NDK: 25c" >> $GITHUB_STEP_SUMMARY
        echo "- P4A: 2023.9.0" >> $GITHUB_STEP_SUMMARY
        echo "- Python: 3.9" >> $GITHUB_STEP_SUMMARY
        echo "- Architecture: arm64-v8a" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK Status: ${{ steps.build.outputs.apk_exists == 'true' && '✅ Available' || '❌ Not found' }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.build.outputs.apk_exists }}" == "true" ]; then
          echo "📦 APK files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la bin/*.apk 2>/dev/null || echo "No APK files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ steps.build.outputs.aab_exists }}" == "true" ]; then
          echo "📦 AAB files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la bin/*.aab 2>/dev/null || echo "No AAB files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔗 Download artifacts from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
