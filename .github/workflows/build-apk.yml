name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK with Kivy Docker
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          kivy/kivy:latest \
          bash -c "
            pip install buildozer cython
            mkdir -p assets data
            python3 -c \"
import base64
png = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNgYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==')
open('assets/icon.png', 'wb').write(png)
open('data/presplash.png', 'wb').write(png)
            \"
            buildozer -v android debug 2>&1 | tee build.log
          "
    
    - name: Check build result
      id: build
      run: |
        if [ -f bin/mzindatrack-1.0.0-debug.apk ]; then
          echo "apk_exists=true" >> $GITHUB_OUTPUT
          ls -lh bin/*.apk
        else
          echo "apk_exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload APK
      if: steps.build.outputs.apk_exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
        retention-days: 7
    
    - name: Build summary
      if: always()
      run: |
        echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ steps.build.outputs.apk_exists == 'true' && '✅ APK Built Successfully' || '❌ Build Failed' }}" >> $GITHUB_STEP_SUMMARY
