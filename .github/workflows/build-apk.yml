name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          libbz2-dev \
          libsqlite3-dev \
          libopenblas-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libfreetype6-dev \
          libgdbm-dev \
          libnss3-dev \
          libatk-bridge2.0-dev \
          libgtk-3-dev \
          python3-pip \
          python3-dev \
          python3-venv \
          wget \
          file
    
    - name: Install buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade buildozer cython
    
    - name: Verify files
      run: |
        ls -la
        echo "--- Checking for buildozer.spec ---"
        test -f buildozer.spec && echo "✅ buildozer.spec found" || echo "❌ buildozer.spec missing!"
        echo "--- Checking for main.py ---"
        test -f main.py && echo "✅ main.py found" || echo "❌ main.py missing!"
    
    - name: Create placeholder assets if missing
      run: |
        mkdir -p assets data
        # Create placeholder icon if missing
        if [ ! -f assets/GPS.ico ]; then
          echo "Creating placeholder icon..."
          # Create a simple 1x1 pixel PNG as placeholder
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/GPS.png
        fi
        # Create placeholder presplash if missing
        if [ ! -f data/presplash.png ]; then
          echo "Creating placeholder presplash..."
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > data/presplash.png
        fi
    
    - name: Build APK with verbose logging
      run: |
        buildozer android debug --verbose 2>&1 | tee build.log
        # Check if build succeeded
        if [ $? -ne 0 ]; then
          echo "❌ Build failed! Last 100 lines of log:"
          tail -n 100 build.log
          exit 1
        fi
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
