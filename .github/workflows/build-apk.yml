name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev liblzma-dev libbz2-dev libsqlite3-dev \
          libopenblas-dev libxml2-dev libxslt1-dev libjpeg-dev libpng-dev \
          libfreetype6-dev python3-pip python3-dev python3-venv wget
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Install buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython virtualenv Pillow
    
    - name: Create placeholder images
      run: |
        mkdir -p assets data
        python3 -c "
        from PIL import Image, ImageDraw, ImageFont
        img = Image.new('RGB', (512, 512), color='#667eea')
        d = ImageDraw.Draw(img)
        try:
            font = ImageFont.truetype('/usr/share/fonts/truetype/ubuntu/Ubuntu-B.ttf', 200)
        except:
            font = ImageFont.load_default()
        d.text((256, 256), 'MT', fill='white', anchor='mm', font=font)
        img.save('assets/icon.png')
        img2 = Image.new('RGB', (1080, 1920), color='#0a0f1e')
        d2 = ImageDraw.Draw(img2)
        d2.text((540, 800), 'MzindaTrack', fill='#667eea', anchor='mm', font=font)
        d2.text((540, 950), 'GPS yathu, Chitetezo chathu', fill='#8892b0', anchor='mm', font=font)
        img2.save('data/presplash.png')
        "
    
    - name: Build APK
      run: |
        rm -rf .buildozer/bin || true
        buildozer -v android debug
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: .buildozer/logs/*.log
        retention-days: 7
