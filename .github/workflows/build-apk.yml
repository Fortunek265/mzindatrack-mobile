name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          libbz2-dev \
          libsqlite3-dev \
          libopenblas-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libfreetype6-dev \
          libgdbm-dev \
          libnss3-dev \
          libatk-bridge2.0-dev \
          libgtk-3-dev \
          python3-pip \
          python3-dev \
          python3-venv \
          wget
        
        # Set Java 17 as default
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Install buildozer and dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython virtualenv Pillow
    
    - name: Initialize buildozer and pre-download SDK
      run: |
        # Initialize buildozer
        buildozer init
        
        # Force SDK download by attempting a dry run
        buildozer android debug || true
        
        # Clean up any failed build artifacts but keep SDK
        rm -rf .buildozer/bin .buildozer/.gradle .buildozer/.cache
        
        # Ensure SDK tools are properly installed
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
        
        # Install missing build tools using sdkmanager if available
        if [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
          echo "✅ sdkmanager found, installing build-tools..."
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
          $ANDROID_HOME/tools/bin/sdkmanager --install "build-tools;33.0.2" "platform-tools" "platforms;android-33" || true
        else
          echo "⚠️ sdkmanager not found, will let buildozer handle it"
        fi
        
        echo "✅ Buildozer initialized"
    
    - name: Create assets and data directories with placeholder images
      run: |
        mkdir -p assets data
        
        # Create icon.png
        python3 -c "
        from PIL import Image, ImageDraw, ImageFont
        # Create icon
        img = Image.new('RGB', (512, 512), color='#667eea')
        d = ImageDraw.Draw(img)
        try:
            font = ImageFont.truetype('/usr/share/fonts/truetype/ubuntu/Ubuntu-B.ttf', 200)
        except:
            font = ImageFont.load_default()
        d.text((256, 256), 'MT', fill='white', anchor='mm', font=font)
        img.save('assets/icon.png')
        img.save('assets/GPS.ico')
        
        # Create presplash
        img2 = Image.new('RGB', (1080, 1920), color='#0a0f1e')
        d2 = ImageDraw.Draw(img2)
        d2.text((540, 800), 'MzindaTrack', fill='#667eea', anchor='mm', font=font)
        d2.text((540, 950), 'GPS yathu, Chitetezo chathu', fill='#8892b0', anchor='mm', font=font)
        img2.save('data/presplash.png')
        print('✅ Placeholder images created')
        "
    
    - name: Verify files
      run: |
        echo "📂 Directory structure:"
        ls -la
        echo ""
        echo "📂 Assets:"
        ls -la assets/ || echo "No assets"
        echo ""
        echo "📂 Data:"
        ls -la data/ || echo "No data"
        echo ""
        echo "📄 Main.py exists:"
        ls -la main.py
    
    - name: Build APK
      run: |
        # Set ANDROID_HOME to where buildozer expects it
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
        
        # Clean previous builds but keep SDK
        rm -rf .buildozer/bin .buildozer/.gradle .buildozer/.cache || true
        
        # Build with debug output
        buildozer -v android debug
        
        echo "✅ Build complete. Checking for APK..."
    
    - name: Find and list APK
      run: |
        echo "🔍 Searching for APK files..."
        find . -name "*.apk" -type f
        echo ""
        echo "📂 Contents of bin directory:"
        ls -la bin/ || echo "bin directory not found"
        echo ""
        echo "📂 Full directory tree:"
        find . -type d -name "bin" -exec ls -la {} \;
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: |
          bin/*.apk
          **/*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Upload build logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/logs/*.log
          .buildozer/**/*.log
          .buildozer/android/platform/*.log
        retention-days: 7
