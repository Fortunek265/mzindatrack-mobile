name: Build MzindaTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          libbz2-dev \
          libsqlite3-dev \
          libopenblas-dev \
          libxml2-dev \
          libxslt1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libfreetype6-dev \
          libgdbm-dev \
          libnss3-dev \
          libatk-bridge2.0-dev \
          libgtk-3-dev \
          python3-pip \
          python3-dev \
          python3-venv \
          wget \
          file \
          libgl1-mesa-dev \
          libgles2-mesa-dev
    
    - name: Install buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade buildozer cython
    
    - name: Verify files
      run: |
        ls -la
        echo "--- Checking for buildozer.spec ---"
        test -f buildozer.spec && echo "✅ buildozer.spec found" || echo "❌ buildozer.spec missing!"
        echo "--- Checking for main.py ---"
        test -f main.py && echo "✅ main.py found" || echo "❌ main.py missing!"
    
    - name: Create placeholder assets if missing
      run: |
        mkdir -p assets data
        # Create placeholder icon - Android needs PNG
        if [ ! -f assets/GPS.png ] && [ ! -f assets/GPS.ico ]; then
          echo "Creating placeholder icon..."
          # Create a minimal 64x64 PNG icon
          convert -size 64x64 xc:blue assets/GPS.png 2>/dev/null || \
          echo "" | base64 -d > assets/GPS.png
        fi
        # Create placeholder presplash if missing
        if [ ! -f data/presplash.png ]; then
          echo "Creating placeholder presplash..."
          convert -size 320x480 xc:navy data/presplash.png 2>/dev/null || \
          echo "" | base64 -d > data/presplash.png
        fi
    
    - name: Fix buildozer.spec for Android
      run: |
        # Update icon to PNG format for Android
        sed -i 's/icon.filename = assets\/GPS.ico/icon.filename = assets\/GPS.png/' buildozer.spec
        
        # Ensure proper Android API levels
        sed -i 's/android.api = 30/android.api = 33/' buildozer.spec
        sed -i 's/android.minapi = 21/android.minapi = 23/' buildozer.spec
    
    - name: Build APK with verbose logging
      run: |
        echo "🚀 Starting build..."
        buildozer android debug --verbose 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "❌ Build failed! Last 100 lines of log:"
          tail -n 100 build.log
          exit 1
        fi
        echo "✅ Build completed successfully!"
        echo ""
        echo "📁 Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null | while read apk; do
          echo "Found: $apk ($(du -h "$apk" | cut -f1))"
        done
        echo ""
        echo "📁 Listing bin directory contents:"
        ls -la bin/ 2>/dev/null || echo "bin directory empty or missing"
        echo ""
        echo "📁 Listing buildozer dist directory:"
        find .buildozer -name "*.apk" -type f 2>/dev/null | head -5
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: |
          bin/*.apk
          .buildozer/android/platform/build/dists/*/build/outputs/apk/debug/*.apk
          .buildozer/bin/*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Debug build output (if upload fails)
      if: failure()
      run: |
        echo "🔍 Debugging: Looking for APK files..."
        find . -type f -name "*.apk" 2>/dev/null || echo "No APK files found anywhere"
        echo ""
        echo "📂 Directory structure of .buildozer:"
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer not found"
        echo ""
        echo "📂 Directory structure of bin:"
        ls -la bin/ 2>/dev/null || echo "bin not found"
