name: Build MzindaTrack APK (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK
      run: |
        # Create buildozer directory with proper permissions
        mkdir -p ~/.buildozer
        
        docker run --rm \
          -v $(pwd):/home/user/hostapp \
          -v ~/.buildozer:/home/user/.buildozer \
          -e BUILDOZER_IGNORE_ROOT=1 \
          -e USER=root \
          kivy/buildozer:latest \
          bash -c "
            cd /home/user/hostapp
            
            # Override the root check by creating a custom buildozer.spec
            # that has the necessary configurations
            
            # Add WebView dependency to spec (use AndroidX version)
            echo 'android.gradle_dependencies = androidx.webkit:webkit:1.8.0' >> buildozer.spec
            
            # Force build by using --force flag and piping 'yes' to avoid prompts
            echo 'y' | buildozer -v android debug
          "
    
    - name: Verify APK
      if: always()
      run: |
        echo "Checking for APK files..."
        if [ -f "bin/*.apk" ]; then
          ls -la bin/*.apk
          echo "✅ APK found!"
        else
          echo "❌ No APK found"
          # Show logs
          find ~/.buildozer -name "*.log" -exec tail -n 50 {} \;
        fi
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mzindatrack-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/.buildozer/logs/*.log
          ~/.buildozer/.buildozer.log
          bin/*.apk
        retention-days: 7
